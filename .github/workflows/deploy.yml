name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Define as permissões necessárias para o GITHUB_TOKEN poder fazer o deploy
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        # O parâmetro --base-href é crucial para o GitHub Pages encontrar os arquivos corretos.
        # Ele deve ter o formato "/nome-do-repositorio/".
        run: flutter build web --base-href "/anest-calc/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
